<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Idea Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-orbit"></div>

  <header class="top-bar">
    <h1>Project Idea Generator</h1>
    <span class="badge">Dark • Minimal</span>
  </header>

  <main class="container">
    <section class="card">
      <div class="card-glow"></div>

      <div class="controls">
        <div class="controls-row">
          <div class="control-group">
            <label for="category">Category</label>
            <select id="category" aria-label="Select category">
              <option value="random">Random</option>
              <option value="python">Python</option>
              <option value="web">Web</option>
              <option value="games">Games</option>
              <option value="tools">Tools</option>
              <option value="ai">AI / ML</option>
              <option value="mobile">Mobile</option>
              <option value="api">APIs</option>
              <option value="cli">CLI</option>
            </select>
          </div>
          <div class="control-group">
            <label for="difficulty">Difficulty</label>
            <select id="difficulty" aria-label="Select difficulty">
              <option value="all">All</option>
              <option value="Beginner">Beginner</option>
              <option value="Intermediate">Intermediate</option>
              <option value="Advanced">Advanced</option>
            </select>
          </div>
          <button id="surprise-btn" class="ghost-btn" aria-label="Surprise me">🎲 Surprise</button>
        </div>
      </div>

      <div id="idea-box" class="idea-box">
        <p class="idea-placeholder">Click "Generate Idea" to get started ✨</p>
      </div>
      <span id="category-pill" class="category-pill"></span>

      <div class="buttons">
        <button id="generate-btn">Generate Idea</button>
        <button id="fav-btn" class="icon-btn" aria-label="Add to favourites">♡</button>
        <button id="copy-btn" class="ghost-btn" aria-label="Copy idea">Copy</button>
        <button id="share-btn" class="ghost-btn" aria-label="Share idea">Share</button>
      </div>

      <p id="status" class="status" aria-live="polite"></p>

      <div class="favourites">
        <div class="fav-header">
          <h2>Favourites <span id="fav-count" class="fav-count-badge"></span></h2>
          <button id="clear-fav" class="tiny-btn">Clear</button>
        </div>
        <input
          id="fav-search"
          class="fav-search"
          type="search"
          placeholder="Search favourites…"
          aria-label="Search favourites"
        />
        <ul id="fav-list" class="fav-list">
          <li class="fav-empty">No favourites yet. Save ideas you like ⭐</li>
        </ul>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>
      Built with ❤️ by <a href="https://github.com/TheM1ddleM1n" target="_blank">TheM1ddleM1n</a> ·
      <a href="https://them1ddlem1n.github.io/project-idea-gen/" target="_blank">Live Demo</a>
    </p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
